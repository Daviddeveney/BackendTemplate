name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: roundreserve-backend
  ECR_REGISTRY: 424029273204.dkr.ecr.us-east-2.amazonaws.com
  EC2_HOST: 3.129.23.156
  REPO_SSH_URL: git@github.com:Daviddeveney/roundreserveproduct-backend-v2.git

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Set up Firebase credentials
      run: |
        mkdir -p certs
        echo '${{ secrets.FIREBASE_CREDENTIALS }}' > certs/roundreservemvp-ac1bd-firebase-adminsdk-fbsvc-8b78f624c5.json
    
    - name: Run tests
      env:
        DJANGO_ENV: test
        POSTGRES_DB: test_db
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_password
        POSTGRES_HOST: localhost
        DJANGO_SECRET_KEY: test-key-123
        BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
        BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
        FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      run: |
        cd src
        python manage.py test

  build-and-deploy:
    name: Build and Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Prepare Firebase credentials
      run: |
        mkdir -p certs
        echo '${{ secrets.FIREBASE_CREDENTIALS }}' > certs/firebase-credentials.json

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      env:
        IMAGE_TAG: ${{ github.sha }}
      with:
        context: .
        file: docker/Dockerfile
        target: production
        push: true
        tags: |
          ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
        build-args: |
          BROWSERBASE_API_KEY=${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID=${{ secrets.BROWSERBASE_PROJECT_ID }}
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
        secret-files: |
          firebase_credentials=./certs/firebase-credentials.json
    
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      with:
        host: ${{ env.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: DEPLOY_KEY,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,ECR_REPOSITORY,ECR_REGISTRY,BROWSERBASE_API_KEY,BROWSERBASE_PROJECT_ID,FIREBASE_API_KEY
        script: |
          set -e  # Exit on any error
          
          echo "🔄 Starting deployment process..."
          
          # Set up SSH for GitHub
          echo "🔑 Setting up SSH authentication..."
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_rsa_deploy
          chmod 600 ~/.ssh/id_rsa_deploy
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
          
          # Configure SSH to use deploy key for GitHub
          cat > ~/.ssh/config << EOL
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_rsa_deploy
            IdentitiesOnly yes
          EOL
          
          chmod 600 ~/.ssh/config
          
          # Navigate to project directory
          echo "📂 Setting up project directory..."
          if [ ! -d "roundreserveproduct-backend-v2" ]; then
            echo "📥 Cloning repository..."
            git clone ${{ env.REPO_SSH_URL }}
          fi
          
          cd roundreserveproduct-backend-v2
          
          echo "🔀 Updating remote URL to use SSH"
          git remote set-url origin ${{ env.REPO_SSH_URL }}
          
          # Update code
          echo "⬆️ Updating code..."
          git fetch origin main
          git reset --hard origin/main
          
          # Ensure environment file exists
          echo "📝 Setting up environment files..."
          if [ ! -f .env ]; then
            if [ ! -f .env.production ]; then
              echo "Creating .env.production from template..."
              cp .env.example .env.production
              # Update environment variables
              sed -i "s/DEBUG=True/DEBUG=False/" .env.production
              sed -i "s/DJANGO_ENV=development/DJANGO_ENV=production/" .env.production
              # Add other production settings
              {
                echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"
                echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY"
                echo "AWS_REGION=$AWS_REGION"
                echo "ECR_REPOSITORY=$ECR_REPOSITORY"
                echo "ECR_REGISTRY=$ECR_REGISTRY"
                echo "BROWSERBASE_API_KEY=$BROWSERBASE_API_KEY"
                echo "BROWSERBASE_PROJECT_ID=$BROWSERBASE_PROJECT_ID"
                echo "FIREBASE_API_KEY=$FIREBASE_API_KEY"
              } >> .env.production
            fi
            ln -sf "$(pwd)/.env.production" "$(pwd)/.env"
          fi
          
          # Create certs directory and add Firebase credentials
          mkdir -p certs
          echo '${{ secrets.FIREBASE_CREDENTIALS }}' > certs/roundreservemvp-ac1bd-firebase-adminsdk-fbsvc-8b78f624c5.json
          
          # Verify environment file
          if [ ! -f .env ]; then
            echo "❌ Environment file setup failed"
            exit 1
          fi
          
          # Ensure script is executable
          echo "🔧 Setting up permissions..."
          chmod +x scripts/deploy.sh
          
          # Run deployment
          echo "🚀 Running deployment script..."
          ./scripts/deploy.sh 